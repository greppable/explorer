name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one concurrent run per branch — newer pushes cancel in-flight runs.
# Both expressions are GitHub-controlled (workflow name + git ref) and are not
# interpolated into any shell `run:` command, so no injection surface here.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      # Lint is informational for now — there are pre-existing
      # react-hooks/set-state-in-effect findings in two viewer components that
      # need a deliberate refactor of the data-fetching pattern. Flip this to a
      # hard failure once those land.
      - name: Lint (informational)
        run: npx eslint
        continue-on-error: true
