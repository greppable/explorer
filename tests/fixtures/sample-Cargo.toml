[package]
name = "myapp"
version = "0.1.0"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }
reqwest = "0.11"

tower-http = { version = "0.5", features = ["cors"] }

[dev-dependencies]
assert_cmd = "2.0"
tempfile = "3.8"

[dependencies.serde_json]
version = "1.0"
features = ["raw_value"]

[build-dependencies]
cc = "1.0"
